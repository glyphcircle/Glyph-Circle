<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F0F23" />
  <title>Glyph Circle</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --color-bg-base: #0F0F23;
      --color-bg-surface: #1a1a2e;
      --color-text-accent: #d4af37;
      --color-text-base: #ffffff;
      --color-button-text: #000000;
      --color-border: #d4af37;
      --color-bg-hover: #2a2a3e;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body { 
      font-family: 'Lora', serif; 
      background: #0F0F23;
      color: white;
      overflow-x: hidden;
    }
    
    h1, h2, h3, h4, h5, h6 { 
      font-family: 'Cinzel', serif; 
    }
    
    #root {
      min-height: 100vh;
    }
    
    .spinner {
      border: 4px solid rgba(212, 175, 55, 0.3);
      border-top: 4px solid #d4af37;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0b2e 0%, #16213e 50%, #0f0f23 100%);
    }
    
    .loading-text {
      margin-top: 20px;
      font-family: 'Cinzel', serif;
      color: #d4af37;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "html2canvas": "https://esm.sh/html2canvas@^1.4.1",
    "jspdf": "https://esm.sh/jspdf@^4.0.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.93.3"
  }
}
</script>
</head>
<body>
  <div id="root">
    <div class="loading-container">
      <div class="spinner"></div>
      <p class="loading-text">LOADING GLYPH CIRCLE...</p>
    </div>
  </div>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            skin: {
              base: 'var(--color-bg-base)',
              surface: 'var(--color-bg-surface)',
              accent: 'var(--color-text-accent)',
              text: 'var(--color-text-base)',
              'button-text': 'var(--color-button-text)',
              border: 'var(--color-border)',
              hover: 'var(--color-bg-hover)',
            }
          },
          fontFamily: {
            cinzel: ['Cinzel', 'serif'],
            lora: ['Lora', 'serif'],
          },
        }
      }
    }
  </script>

  <script src="https://checkout.razorpay.com/v1/checkout.js" async></script>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
